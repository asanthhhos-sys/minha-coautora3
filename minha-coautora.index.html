<title>Minha Coautora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Cormorant+Garamond:wght@500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Poppins:wght@400;500;600;700&family=Nunito+Sans:wght@400;600;700&family=Quicksand:wght@500;600;700&family=Lora:ital,wght@0,500;1,500&family=Josefin+Sans:wght@500;600&family=Dancing+Script:wght@600;700&family=Marcellus&family=Prata&family=Cinzel:wght@600&family=Libre+Baskerville&family=EB+Garamond:wght@500;600&family=Caveat:wght@600;700&family=Comfortaa:wght@600;700&family=Merriweather:wght@400;700&family=Raleway:wght@500;600;700&family=Crimson+Text:ital@0;1&family=Space+Grotesk:wght@500;600&family=Bodoni+Moda:wght@600;700&family=Great+Vibes&family=Karla:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#C9A87C; --primary-dark:#B08F63; --bg:#F6EEE1; --surface:#FFFDF9; --text:#4A3A2A;
  --text-soft:#8A7862; --accent:#C9A24B; --card-radius:22px; --font-body:'Nunito Sans',sans-serif;
  --font-display:'Playfair Display',serif; --font-size:16px; --shadow:0 8px 24px rgba(120,90,50,0.12);
  --danger:#C1594A; --success:#6E9B7B;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:var(--font-body); background:var(--bg); color:var(--text);
  font-size:var(--font-size); overscroll-behavior:none; user-select:none;
  -webkit-user-select:none;
}
input,textarea{user-select:text; -webkit-user-select:text;}
#app{max-width:480px; margin:0 auto; height:100vh; height:100dvh; display:flex; flex-direction:column; background:var(--bg); position:relative; overflow:hidden;}
.dark{--bg:#241C15; --surface:#332921; --text:#F3E9DC; --text-soft:#C9B8A4; --shadow:0 8px 24px rgba(0,0,0,0.35);}

/* Top bar */
.topbar{display:flex; align-items:center; gap:10px; padding:14px 16px 10px; padding-top:calc(14px + env(safe-area-inset-top)); flex-shrink:0;}
.topbar h1{font-family:var(--font-display); font-size:1.4rem; margin:0; flex:1; font-weight:700;}
.iconbtn{width:38px; height:38px; border-radius:50%; border:none; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:1.1rem; box-shadow:var(--shadow); cursor:pointer; color:var(--text); flex-shrink:0;}
.iconbtn:active{transform:scale(0.92);}

/* Scroll area */
.scroll{flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:0 16px 100px;}
.scroll.noflex{padding-bottom:24px;}

/* Bottom nav */
.bottomnav{display:flex; justify-content:space-around; align-items:center; padding:10px 8px calc(10px + env(safe-area-inset-bottom)); background:var(--surface); box-shadow:0 -4px 20px rgba(120,90,50,0.10); flex-shrink:0; position:relative; z-index:5;}
.navitem{display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--text-soft); font-size:0.68rem; font-family:var(--font-body); cursor:pointer; padding:4px 10px;}
.navitem.active{color:var(--primary-dark); font-weight:700;}
.navitem .ic{font-size:1.25rem;}

/* Fab */
.fab-new{display:flex; align-items:center; justify-content:center; gap:8px; background:linear-gradient(135deg,var(--accent),var(--primary-dark)); color:#fff; border:none; border-radius:18px; padding:16px; font-size:1rem; font-weight:700; font-family:var(--font-display); width:100%; box-shadow:0 10px 26px rgba(180,140,70,0.35); cursor:pointer; margin:6px 0 18px;}
.fab-new:active{transform:scale(0.98);}

/* Story cards */
.story-card{display:flex; gap:12px; background:var(--surface); border-radius:var(--card-radius); padding:10px; margin-bottom:14px; box-shadow:var(--shadow); cursor:pointer;}
.story-cover{width:96px; height:64px; border-radius:14px; object-fit:cover; flex-shrink:0; background:linear-gradient(135deg,var(--primary),var(--accent));}
.story-info{flex:1; min-width:0; display:flex; flex-direction:column; justify-content:center;}
.story-title{font-family:var(--font-display); font-weight:700; font-size:1.02rem; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.story-syn{font-size:0.78rem; color:var(--text-soft); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin:0 0 4px;}
.story-meta{font-size:0.68rem; color:var(--text-soft); opacity:0.8;}

.empty{text-align:center; padding:60px 20px; color:var(--text-soft);}
.empty .ic{font-size:2.6rem; display:block; margin-bottom:10px;}

/* Drawer */
.drawer-overlay{position:absolute; inset:0; background:rgba(30,20,10,0.4); z-index:20; opacity:0; pointer-events:none; transition:opacity .25s;}
.drawer-overlay.open{opacity:1; pointer-events:auto;}
.drawer{position:absolute; top:0; left:0; bottom:0; width:78%; max-width:300px; background:var(--surface); z-index:21; transform:translateX(-105%); transition:transform .28s ease; padding:calc(20px + env(safe-area-inset-top)) 18px 20px; display:flex; flex-direction:column;}
.drawer.open{transform:translateX(0);}
.drawer h2{font-family:var(--font-display); font-size:1.3rem; margin:0 0 20px;}
.drawer-item{display:flex; align-items:center; gap:12px; padding:13px 8px; border-radius:12px; background:none; border:none; text-align:left; font-size:0.95rem; color:var(--text); cursor:pointer; font-family:var(--font-body);}
.drawer-item:active{background:var(--bg);}
.drawer-item .ic{width:22px; text-align:center;}

/* Forms */
.field{margin-bottom:16px;}
.field label{display:block; font-size:0.78rem; font-weight:700; color:var(--text-soft); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em;}
.field input[type=text], .field input[type=number], .field textarea, .field select{
  width:100%; padding:12px 14px; border-radius:14px; border:1.5px solid rgba(150,120,80,0.25); background:var(--surface); color:var(--text); font-family:var(--font-body); font-size:0.95rem; resize:vertical;
}
.field textarea{min-height:80px;}
.chips{display:flex; flex-wrap:wrap; gap:8px;}
.chip{padding:7px 13px; border-radius:20px; background:var(--surface); border:1.5px solid rgba(150,120,80,0.25); font-size:0.78rem; cursor:pointer; color:var(--text-soft);}
.chip.sel{background:var(--primary); color:#fff; border-color:var(--primary); font-weight:700;}
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 18px; border-radius:14px; border:none; font-family:var(--font-body); font-weight:700; font-size:0.9rem; cursor:pointer;}
.btn-primary{background:var(--primary-dark); color:#fff;}

   MINHA COAUTORA — app único (HTML/CSS/JS), PWA mobile-first
   Persistência: window.storage (por usuário, não compartilhada)
   IA: chamadas ao endpoint interno de mensagens (aparece ao
   usuário só como "IA do sistema")
   ============================================================ */

const AI_MODEL = "claude-sonnet-4-6";

async function callAI(messages, {max_tokens=1200, system=""} = {}){
  try{
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model: AI_MODEL,
        max_tokens,
        system: system || undefined,
        messages
      })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message || "Erro na IA");
    const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("\n").trim();
    return text;
  }catch(e){
    console.error(e);
    throw e;
  }
}

// ---------- storage helpers ----------
async function dbGet(key, fallback){
  try{
    const r = await window.storage.get(key, false);
    return r ? JSON.parse(r.value) : fallback;
  }catch(e){ return fallback; }
}
async function dbSet(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), false); }
  catch(e){ console.error("storage set failed", e); toast("Erro ao salvar. Tente novamente."); }
}
async function dbDel(key){
  try{ await window.storage.delete(key, false); }catch(e){}
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

// ---------- image helpers ----------
function resizeImageFile(file, w, h){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e=>{
      const img = new Image();
      img.onload = ()=>{
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        const ctx = canvas.getContext('2d');
        const scale = Math.max(w/img.width, h/img.height);
        const sw = w/scale, sh = h/scale;
        const sx = (img.width-sw)/2, sy=(img.height-sh)/2;
        ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.85));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- toast ----------
let toastTimer;
function toast(msg){
  let el = document.querySelector('.toast');
  if(!el){ el = document.createElement('div'); el.className='toast'; document.getElementById('app').appendChild(el); }
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2400);
}

function applyTheme(){

  root.style.setProperty('--primary', t.c);
  root.style.setProperty('--primary-dark', t.a);

  root.style.setProperty('--font-body', `'${FONTS[STATE.settings.font]||'Nunito Sans'}',sans-serif`);

// ============================================================
// HANDLERS (delegação de eventos)
// ============================================================
function attachHandlers(){
  const app = document.getElementById('app');
  app.onclick = async (e)=>{
    const t = e.target.closest('[data-act]');
    if(!t) return;
    const act = t.dataset.act;
    try{ await ACTIONS[act]?.(t, e); }
    catch(err){ console.error(err); toast('Algo deu errado. Tente de novo.'); }
  };
  app.onchange = async (e)=>{
    const t = e.target.closest('[data-act]');
    if(!t) return;
    try{ await ACTIONS[t.dataset.act]?.(t, e); }
    catch(err){ console.error(err); toast('Algo deu errado. Tente de novo.'); }
  };
  const chatInput = document.getElementById('chatInput');
  if(chatInput){
    chatInput.addEventListener('keydown', ev=>{
      if(ev.key==='Enter' && !ev.shiftKey){ ev.preventDefault(); ACTIONS.sendChat(); }
    });
    const cm = document.getElementById('chatMsgs');
    if(cm) cm.scrollTop = cm.scrollHeight;
  }
}

function esc(s){ return (s||'').toString().replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escNl(s){ return esc(s).replace(/\n/g,'<br>'); }
function fmtDate(ts){ if(!ts) return 'agora'; const d=new Date(ts); return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }

async function ensureStoryCache(id){
  if(!CACHE[id]){
    CACHE[id] = {
      chat: await dbGet(`story:${id}:chat`, []),
      chapters: await dbGet(`story:${id}:chapters`, []),
      characters: await dbGet(`story:${id}:characters`, []),
      wardrobe: await dbGet(`story:${id}:wardrobe`, {}),
      map: await dbGet(`story:${id}:map`, []),
      timeline: await dbGet(`story:${id}:timeline`, []),
      reviewResult: null,
    };
  }
  return CACHE[id];
}
async function saveStoryPart(id, part, key){
  await dbSet(`story:${id}:${key}`, CACHE[id][key]);
}

const ACTIONS = {
  openDrawer: ()=>{ STATE.drawerOpen=true; render(); },
  closeDrawer: ()=>{ STATE.drawerOpen=false; render(); },
  go: (t)=>{ if(t.dataset.view==='create') DRAFT=null; go(t.dataset.view); },
  navgo: (t)=>{ if(t.dataset.view==='create') DRAFT=null; go(t.dataset.view); },
  closeModal: ()=>{ STATE.modal=null; render(); },

  openStory: async (t)=>{ const id=t.dataset.id; await ensureStoryCache(id); go('story', {storyId:id, storyTab:'chat'}); },
  storyTab: (t)=>{ STATE.storyTab=t.dataset.t; render(); },

  // ---- create story ----
  pickCover: ()=>{ document.getElementById('coverInput').onchange = async (e)=>{
      const f = e.target.files[0]; if(!f) return;
      DRAFT.cover = await resizeImageFile(f, 600, 300); render();
    }; document.getElementById('coverInput').click(); },
  removeCover: ()=>{ DRAFT.cover=null; render(); },
  toggleGenre: (t)=>{ const g=t.dataset.g; const i=DRAFT.genres.indexOf(g); if(i>-1) DRAFT.genres.splice(i,1); else DRAFT.genres.push(g); render(); },
  saveStory: async ()=>{
    DRAFT.title = document.getElementById('f_title').value.trim();
    if(!DRAFT.title){ toast('Dê um título para sua história.'); return; }
    DRAFT.synopsis = document.getElementById('f_synopsis').value;
    DRAFT.tags = document.getElementById('f_tags').value;
    DRAFT.universe = document.getElementById('f_universe').value;
    DRAFT.rating = document.getElementById('f_rating').value;

function touchStory(id){ const s=STORIES.find(x=>x.id===id); if(s){ s.updatedAt=Date.now(); dbSet('stories', STORIES); } }

async function wipeAll(){
  STATE.trashList = await dbGet('trash', []);
  STATE.trashList = STATE.trashList.concat(STORIES);
  await dbSet('trash', STATE.trashList);
  STORIES = [];
  await dbSet('stories', STORIES);
  toast('Histórias movidas para a lixeira.');
}

// load trash when entering view
const _origGo = go;
go = function(view, extra={}){
  _origGo(view, extra);
  if(view==='trash') dbGet('trash', []).then(t=>{ STATE.trashList=t; render(); });
};

function buildStoryContext(id, s){
  const c = CACHE[id] || {};
  let ctx = `Título: ${s.title}\nSinopse: ${s.synopsis||''}\nGêneros: ${(s.genres||[]).join(', ')}\nUniverso: ${s.universe||''}\n`;
  if(c.characters?.length){
    ctx += '\nPersonagens:\n' + c.characters.map(ch=>`- ${ch.name}: ${ch.age||''} anos, ${ch.profession||ch.course||''}. Personalidade: ${(ch.personality||[]).join(', ')}. Aparência: ${JSON.stringify(ch.appearance||{})}`).join('\n');
  }
  if(c.map?.length){
    ctx += '\nLocais:\n' + c.map.map(p=>`- ${p.name} (${p.type}): ${JSON.stringify(p.analysis||{})}`).join('\n');
  }
  if(c.timeline?.length){
    ctx += '\nCronologia:\n' + c.timeline.map(e=>`- ${e.when} (${e.period}): ${e.title}`).join('\n');
  }
  if(c.chapters?.length){
    const last = c.chapters.slice().sort((a,b)=>b.number-a.number)[0];
    ctx += `\nÚltimo capítulo (${last.number} - ${last.title||''}), resumo do final: ${(last.content||'').slice(-800)}`;
  }
  return ctx;
}

// ---------- restore backup ----------
document.addEventListener('change', async (e)=>{
  if(e.target.id==='restoreInput'){
    const f = e.target.files[0]; if(!f) return;
    try{
      const text = await f.text();
      const data = JSON.parse(text);
      STATE.settings = data.settings || STATE.settings;
      STORIES = data.stories || [];
      await dbSet('settings', STATE.settings);
      await dbSet('stories', STORIES);
      CACHE = {};
      for(const id in (data.details||{})){
        CACHE[id] = data.details[id];
        await dbSet(`story:${id}:chat`, CACHE[id].chat||[]);
        await dbSet(`story:${id}:chapters`, CACHE[id].chapters||[]);
        await dbSet(`story:${id}:characters`, CACHE[id].characters||[]);
        await dbSet(`story:${id}:wardrobe`, CACHE[id].wardrobe||{});
        await dbSet(`story:${id}:map`, CACHE[id].map||[]);
        await dbSet(`story:${id}:timeline`, CACHE[id].timeline||[]);
      }
      toast('Backup restaurado com sucesso!');
      go('home');
    }catch(err){ console.error(err); toast('Arquivo de backup inválido.'); }
  }
});

boot();
